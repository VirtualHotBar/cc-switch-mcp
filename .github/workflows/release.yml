name: Build and Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: win32-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: cc-switch-mcp.exe
          
          - name: darwin-x64
            os: macos-latest
            target: x86_64-apple-darwin
            binary: cc-switch-mcp
          
          - name: darwin-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            binary: cc-switch-mcp
          
          - name: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: cc-switch-mcp

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Build
        run: cargo build --release --no-default-features --target ${{ matrix.target }}

      - name: Strip binary (Unix)
        if: matrix.os != 'windows-latest'
        run: strip target/${{ matrix.target }}/release/${{ matrix.binary }}

      - name: Get version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Create package directory
        run: |
          mkdir -p packages/${{ matrix.name }}/binary
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} packages/${{ matrix.name }}/binary/cc-switch-mcp${{ matrix.name == 'win32-x64' && '.exe' || '' }}

      - name: Create package.json
        shell: bash
        run: |
          cat > packages/${{ matrix.name }}/package.json << EOF
          {
            "name": "@imvhb/cc-switch-mcp-server-${{ matrix.name }}",
            "version": "${{ steps.get_version.outputs.VERSION }}",
            "description": "CC Switch MCP Server binary for ${{ matrix.name }}",
            "license": "MIT",
            "repository": {
              "type": "git",
              "url": "git+https://github.com/VirtualHotBar/cc-switch-mcp.git"
            },
            "author": "CC Switch Team",
            "os": ["${{ matrix.name == 'win32-x64' && 'win32' || startsWith(matrix.name, 'darwin') && 'darwin' || 'linux' }}"],
            "cpu": ["${{ endsWith(matrix.name, 'arm64') && 'arm64' || 'x64' }}"],
            "files": ["binary/", "README.md"],
            "publishConfig": {
              "access": "public"
            }
          }
          EOF

      - name: Create README
        shell: bash
        run: |
          cat > packages/${{ matrix.name }}/README.md << EOF
          # @imvhb/cc-switch-mcp-server-${{ matrix.name }}
          
          Binary package for CC Switch MCP Server (${{ matrix.name }}).
          
          This package is automatically installed as an optional dependency.
          
          ## License
          
          MIT
          EOF

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.name }}
          path: packages/${{ matrix.name }}

  publish-platform:
    name: Publish ${{ matrix.name }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    strategy:
      matrix:
        name: [win32-x64, darwin-x64, darwin-arm64, linux-x64]
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: package-${{ matrix.name }}
          path: package

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to NPM
        run: npm publish --access public --provenance
        working-directory: package

  publish-main:
    name: Publish Main Package
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          registry-url: 'https://registry.npmjs.org'

      - name: Get version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update package version
        run: npm version ${{ steps.get_version.outputs.VERSION }} --no-git-tag-version --allow-same-version

      - name: Update optionalDependencies version
        run: |
          node -e "
          const pkg = require('./package.json');
          const version = '${{ steps.get_version.outputs.VERSION }}';
          Object.keys(pkg.optionalDependencies || {}).forEach(name => {
            pkg.optionalDependencies[name] = version;
          });
          require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "

      - name: Publish to NPM
        run: npm publish --access public --provenance

  release:
    name: Create GitHub Release
    needs: [build, publish-platform, publish-main]
    runs-on: ubuntu-latest
    steps:
      - name: Get version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download Windows x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: package-win32-x64
          path: artifacts/win32-x64

      - name: Download macOS x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: package-darwin-x64
          path: artifacts/darwin-x64

      - name: Download macOS ARM64 artifact
        uses: actions/download-artifact@v4
        with:
          name: package-darwin-arm64
          path: artifacts/darwin-arm64

      - name: Download Linux x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: package-linux-x64
          path: artifacts/linux-x64

      - name: Prepare release files
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          mkdir -p release
          cp artifacts/win32-x64/binary/cc-switch-mcp.exe release/cc-switch-mcp-v${VERSION}-win32-x64.exe
          cp artifacts/darwin-x64/binary/cc-switch-mcp release/cc-switch-mcp-v${VERSION}-darwin-x64
          cp artifacts/darwin-arm64/binary/cc-switch-mcp release/cc-switch-mcp-v${VERSION}-darwin-arm64
          cp artifacts/linux-x64/binary/cc-switch-mcp release/cc-switch-mcp-v${VERSION}-linux-x64
          ls -lh release/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
          body: |
            # CC Switch MCP Server v${{ steps.get_version.outputs.VERSION }}
            
            ## Installation
            
            ```bash
            npm install -g @imvhb/cc-switch-mcp-server
            ```
            
            npm will automatically install the correct binary for your platform!
            
            ## Supported Platforms
            
            - Windows x64
            - macOS x64 (Intel)
            - macOS ARM64 (Apple Silicon)
            - Linux x64
            
            ## What's Changed
            
            See [CHANGELOG.md](https://github.com/VirtualHotBar/cc-switch-mcp/blob/main/CHANGELOG.md) for details.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
